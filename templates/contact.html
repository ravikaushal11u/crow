<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Ravi Kaushal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px 8%;
}

header h1{
    color:#38bdf8;
}

nav{
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-right:20px;
}

nav a:hover{
    color:#38bdf8;
}

.container{
    width:90%;
    max-width:700px;
    margin:50px auto;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
}

.card h2{
    color:#38bdf8;
    text-align:center;
    margin-bottom:25px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
    background:#334155;
    color:white;
}

textarea{
    height:150px;
    resize:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

.info{
    margin-top:30px;
    text-align:center;
    line-height:30px;
    color:#cbd5e1;
}

footer{
    background:#111827;
    text-align:center;
    padding:20px;
    margin-top:50px;
    color:#94a3b8;
}
</style>

</head>
<body>

<header>
<h1>Ravi Kaushal</h1>

<nav>
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/project">Projects</a>
<a href="/contact">Contact</a>
</nav>

</header>

<div class="container">

<div class="card">

<h2>Contact Me</h2>

<form method="POST" action="/contact">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="text" name="subject" placeholder="Subject">

<textarea name="message" placeholder="Write your message..." required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="info">
<p>📧 ravi@example.com</p>
<p>📱 +91 9876543210</p>
<p>📍 Jharkhand, India</p>
</div>

</div>

</div>

<footer>
© 2026 Ravi Kaushal | Portfolio
</footer>

</body>
</html>
