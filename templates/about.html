<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GET Form Example</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    text-align:center;
}

.container h1{
    color:#333;
    margin-bottom:10px;
}

.container p{
    color:#666;
    margin-bottom:30px;
}

form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

input{
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:16px;
    transition:.3s;
}

input:focus{
    border-color:#4facfe;
    box-shadow:0 0 8px rgba(79,172,254,.4);
}

button{
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0f8cff;
    transform:translateY(-2px);
}

.info{
    margin-top:30px;
    padding:18px;
    background:#f5f5f5;
    border-radius:12px;
}

.info h2{
    color:#444;
    margin-bottom:10px;
}

.info p{
    color:#555;
    line-height:1.6;
}

.footer{
    margin-top:25px;
    color:#888;
    font-size:14px;
}

@media(max-width:500px){

.container{
    width:90%;
    padding:30px;
}

}
</style>

</head>

<body>

<div class="container">

    <h1>GET Form Example</h1>

    <p>Search a user by entering the name below.</p>

    <form action="/search" method="GET">

        <input
            type="text"
            name="name"
            placeholder="Enter Your Name"
            required>

        <button type="submit">
            🔍 Search
        </button>

    </form>

    <div class="info">

        <h2>Hello 👋</h2>

        <p>
            Hello, I am <strong>Ravi</strong>.<br>
            Welcome to my sample GET Form page built using HTML & CSS.
        </p>

    </div>

    <div class="footer">
        © 2026 Ravi | HTML GET Form Demo
    </div>

</div>

</body>
</html>
